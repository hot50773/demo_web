on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Global constants
  K8S_REPO_OWNER: "hot50773"
  K8S_REPO_NAME: "devops"
  PLATFORM: "linux/amd64"
  GAR_REGISTRY: ${{ secrets.GAR_REGISTRY }}
  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}

jobs:
  set-environment:
    name: "Set Target Environment"
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.map.outputs.env_name }}
    steps:
      - id: map
        run: |
          echo "Checking branch: ${{ github.ref_name }}"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT
          else
            echo "Error: Branch ${{ github.ref_name }} is not mapped to an environment."
            exit 1
          fi

  build-and-push:
    name: "Build and Push Docker Image"
    needs: set-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.set-environment.outputs.env_name }}
    
    env:
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}

    outputs:
      full_image_path: ${{ steps.prep.outputs.full_image_path }}

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Cache npm dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: "Generate build ID"
        id: prep
        run: |
          branch=${GITHUB_REF##*/}
          sha=${GITHUB_SHA::8}
          ts=$(date +%s)
          build_id=${branch}-${sha}-${ts}
          echo "full_image_path=${{ env.GAR_REGISTRY }}/${{ env.SERVICE_NAME }}:${build_id}" >> $GITHUB_OUTPUT

      - name: "Authenticate to Google Cloud (WIF)"
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: access_token
          workload_identity_provider: '${{ env.WIF_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: "Login to GAR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORM }}
          tags: ${{ steps.prep.outputs.full_image_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

