on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PLATFORM: "linux/amd64"
  SERVICE_NAME: "demo-web"
  GAR_REGISTRY: ${{ secrets.GAR_REGISTRY }}
  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}

jobs:
  build-and-push:
    name: "Build and Push Docker Image"
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Generate build ID"
        id: prep
        run: |
          branch=${GITHUB_REF##*/}
          sha=${GITHUB_SHA::8}
          ts=$(date +%s)
          build_id=${branch}-${sha}-${ts}
          echo "full_image_path=${{ env.GAR_REGISTRY }}/${{ env.SERVICE_NAME }}:${build_id}" >> $GITHUB_OUTPUT

      - name: "Authenticate to Google Cloud (WIF)"
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: access_token
          workload_identity_provider: '${{ env.WIF_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: "Login to GAR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORM }}
          tags: ${{ steps.prep.outputs.full_image_path }}